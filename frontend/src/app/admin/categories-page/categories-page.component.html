<section class="page"><div class="page-title"><span class="eyebrow">Menu</span><h1>Category management</h1></div><form class="panel wide" [formGroup]="form" (ngSubmit)="save()" appFocusNext><div class="form-row"><label class="field">Category name<input class="form-control" formControlName="categoryName"></label><label class="field">Description<input class="form-control" formControlName="description"></label></div><div class="actions"><button class="btn btn-primary" [disabled]="form.invalid">Save category</button></div></form><app-data-table [rows]="rows" (deleteRow)="delete($event)"></app-data-table></section>
