<div class="table-wrap shadow-sm"><table class="table table-hover align-middle mb-0"><thead><tr><th *ngFor="let key of keys">{{ label(key) }}</th><th *ngIf="editRow.observers.length || deleteRow.observers.length">Action</th></tr></thead><tbody><tr *ngFor="let row of rows"><td *ngFor="let key of keys" [attr.data-label]="label(key)">{{ value(row[key]) }}</td><td data-label="Action" *ngIf="editRow.observers.length || deleteRow.observers.length"><button class="btn btn-sm btn-outline-primary me-2" *ngIf="editRow.observers.length" (click)="editRow.emit(row)">Edit</button><button class="btn btn-sm btn-danger" *ngIf="deleteRow.observers.length" (click)="deleteRow.emit(row)">Delete</button></td></tr><tr *ngIf="!rows.length"><td class="text-muted p-4" colspan="9">No records found.</td></tr></tbody></table></div>
