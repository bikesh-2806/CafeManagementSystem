<section class="page"><div class="page-title"><span class="eyebrow">Floor</span><h1>Table management</h1></div><form class="panel wide" [formGroup]="form" (ngSubmit)="save()" appFocusNext><div class="form-row"><label class="field">Table number<input class="form-control" formControlName="tableNumber"></label><label class="field">Capacity<input class="form-control" type="number" formControlName="capacity"></label><label class="field">Status<select class="form-select" formControlName="status"><option>Available</option><option>Occupied</option><option>Reserved</option></select></label></div><div class="actions"><button class="btn btn-primary" [disabled]="form.invalid">Save table</button></div></form><app-data-table [rows]="rows" (deleteRow)="delete($event)"></app-data-table></section>
