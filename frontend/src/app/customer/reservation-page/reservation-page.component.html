<section class="page"><div class="page-title"><span class="eyebrow">Booking</span><h1>Reservation</h1></div><form class="panel wide" [formGroup]="form" (ngSubmit)="submit()" appFocusNext><div class="form-row"><label class="field">Table ID<input class="form-control" type="number" formControlName="tableId"></label><label class="field">Reservation date and time<input class="form-control" type="datetime-local" formControlName="reservationDate"></label><label class="field">Number of guests<input class="form-control" type="number" formControlName="numberOfGuests"></label></div><div class="actions"><button class="btn btn-primary">Reserve table</button></div></form><app-data-table [rows]="reservations"></app-data-table></section>
